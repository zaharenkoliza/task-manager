name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    name: Backend – lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff (lint)
        run: |
          ruff check src tests

  backend-format-check:
    name: Backend – format (Black)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Black in check mode
        run: |
          black --check src tests

  backend-test:
    name: Backend – tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tasks_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DEBUG: "false"
        run: |
          pytest --cov=src/app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  backend-build:
    name: Backend – build
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend sources compile
        run: |
          python -m compileall src

  frontend-test:
    name: Frontend – tests
    runs-on: ubuntu-latest
    needs: backend-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/lcov.info

  sonarqube-backend:
    name: SonarQube Backend Analysis
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: backend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend

  sonarqube-frontend:
    name: SonarQube Frontend Analysis
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend

  frontend-build:
    name: Frontend – build
    runs-on: ubuntu-latest
    needs: frontend-test

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  push-to-registry:
    name: Push images to Yandex Container Registry
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, sonarqube-backend, sonarqube-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_JSON_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            cr.yandex/crp10m317mg7ppiikck3/task-manager-backend:latest
            cr.yandex/crp10m317mg7ppiikck3/task-manager-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            cr.yandex/crp10m317mg7ppiikck3/task-manager-frontend:latest
            cr.yandex/crp10m317mg7ppiikck3/task-manager-frontend:${{ github.sha }}

      - name: Update image tags in k8s manifests
        run: |
          sed -i "s|task-manager-backend:.*|task-manager-backend:${{ github.sha }}|g" k8s/backend/deployment.yaml
          sed -i "s|task-manager-frontend:.*|task-manager-frontend:${{ github.sha }}|g" k8s/frontend/deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
          git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push

  deploy:
    name: Deploy via Argo CD
    runs-on: ubuntu-latest
    needs: push-to-registry
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync Argo CD application
        run: |
          argocd app sync task-manager \
            --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --insecure \
            --timeout 120

      - name: Wait for rollout
        run: |
          argocd app wait task-manager \
            --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --insecure \
            --timeout 120

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-format-check, backend-test, backend-build, frontend-test, frontend-build, sonarqube-backend, sonarqube-frontend, push-to-registry, deploy]
    if: always()

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Task Manager CI/CD*

            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref_name }}`
            Коммит: `${{ github.sha }}`
            Автор: ${{ github.actor }}

            *Результаты jobs:*
            Backend Lint: ${{ needs.backend-lint.result == 'success' && '✅' || needs.backend-lint.result == 'failure' && '❌' || '⏭️' }}
            Backend Format: ${{ needs.backend-format-check.result == 'success' && '✅' || needs.backend-format-check.result == 'failure' && '❌' || '⏭️' }}
            Backend Tests: ${{ needs.backend-test.result == 'success' && '✅' || needs.backend-test.result == 'failure' && '❌' || '⏭️' }}
            Backend Build: ${{ needs.backend-build.result == 'success' && '✅' || needs.backend-build.result == 'failure' && '❌' || '⏭️' }}
            Frontend Tests: ${{ needs.frontend-test.result == 'success' && '✅' || needs.frontend-test.result == 'failure' && '❌' || '⏭️' }}
            Frontend Build: ${{ needs.frontend-build.result == 'success' && '✅' || needs.frontend-build.result == 'failure' && '❌' || '⏭️' }}
            SonarQube Backend: ${{ needs.sonarqube-backend.result == 'success' && '✅' || needs.sonarqube-backend.result == 'failure' && '❌' || '⏭️' }}
            SonarQube Frontend: ${{ needs.sonarqube-frontend.result == 'success' && '✅' || needs.sonarqube-frontend.result == 'failure' && '❌' || '⏭️' }}
            Push to Registry: ${{ needs.push-to-registry.result == 'success' && '✅' || needs.push-to-registry.result == 'failure' && '❌' || '⏭️' }}
            Deploy: ${{ needs.deploy.result == 'success' && '✅' || needs.deploy.result == 'failure' && '❌' || '⏭️' }}
