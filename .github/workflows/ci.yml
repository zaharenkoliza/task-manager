name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    name: Backend – lint
    runs-on: ubuntu-latest
    continue-on-error: true

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff (lint)
        run: |
          ruff check src tests

  backend-format-check:
    name: Backend – format (Black)
    runs-on: ubuntu-latest
    continue-on-error: true

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Black in check mode
        run: |
          black --check src tests

  backend-test:
    name: Backend – tests
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-format-check]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tasks_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DEBUG: "false"
        run: |
          pytest --cov=src/app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  backend-build:
    name: Backend – build
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend sources compile
        run: |
          python -m compileall src

  frontend-test:
    name: Frontend – tests
    runs-on: ubuntu-latest
    needs: backend-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/lcov.info

  sonarcloud-frontend:
    name: SonarCloud Frontend Analysis
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
        with:
          projectBaseDir: frontend

  frontend-build:
    name: Frontend – build
    runs-on: ubuntu-latest
    needs: frontend-test

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  sonarcloud-analysis:
    name: SonarCloud Backend Analysis
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: backend

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend

  push-to-registry:
    name: Push images to Yandex Container Registry
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, sonarcloud-analysis, sonarcloud-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_JSON_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            cr.yandex/crp10m317mg7ppiikck3/task-manager-backend:latest
            cr.yandex/crp10m317mg7ppiikck3/task-manager-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            cr.yandex/crp10m317mg7ppiikck3/task-manager-frontend:latest
            cr.yandex/crp10m317mg7ppiikck3/task-manager-frontend:${{ github.sha }}

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-format-check, backend-test, sonarcloud-analysis, sonarcloud-frontend, push-to-registry]
    if: always()

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Task Manager CI/CD*

            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref_name }}`
            Коммит: `${{ github.sha }}`
            Автор: ${{ github.actor }}

            *Результаты jobs:*
            Lint: ${{ needs.backend-lint.result == 'success' && '✅' || '❌' }}
            Format: ${{ needs.backend-format-check.result == 'success' && '✅' || '❌' }}
            Tests \(покрытие ≥80%\): ${{ needs.backend-test.result == 'success' && '✅' || '❌' }}
            SonarCloud Backend: ${{ needs.sonarcloud-analysis.result == 'success' && '✅' || '❌' }}
            SonarCloud Frontend: ${{ needs.sonarcloud-frontend.result == 'success' && '✅' || '❌' }}
            Push to Registry: ${{ needs.push-to-registry.result == 'success' && '✅' || needs.push-to-registry.result == 'skipped' && '⏭️' || '❌' }}
