apiVersion: v1
kind: ConfigMap
metadata:
  name: task-manager-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  task-manager.json: |
    {
      "title": "FastAPI Observability",
      "uid": "task-manager-fastapi",
      "refresh": "5s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "schemaVersion": 42,
      "panels": [
        {
          "id": 1,
          "title": "Total Requests",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "sum(http_requests_total{job=\"task-manager-backend\", handler!=\"/metrics\"})",
            "legendFormat": "",
            "refId": "A"
          }],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }] }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "title": "Requests Count by Endpoint",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "http_requests_total{job=\"task-manager-backend\", handler!=\"/metrics\"}",
            "legendFormat": "{{method}} {{handler}}",
            "refId": "A"
          }],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }] }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "title": "Average Request Duration",
          "type": "bargauge",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "http_request_duration_seconds_sum{job=\"task-manager-backend\"} / http_request_duration_seconds_count{job=\"task-manager-backend\"}",
            "legendFormat": "{{method}} {{handler}}",
            "refId": "A"
          }],
          "options": {
            "displayMode": "lcd",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "continuous-GrYlRd" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "title": "Total 5xx Errors",
          "type": "stat",
          "gridPos": { "h": 7, "w": 4, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "sum(http_requests_total{job=\"task-manager-backend\", status=~\"5..\"})",
            "legendFormat": "",
            "refId": "A"
          }],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "title": "Percent of 2xx Requests",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 10, "x": 4, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "sum by(handler) (http_requests_total{job=\"task-manager-backend\", status=\"2xx\", handler!=\"/metrics\"}) / sum by(handler) (http_requests_total{job=\"task-manager-backend\", handler!=\"/metrics\"})",
            "legendFormat": "{{handler}}",
            "refId": "A"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 0.8 }] },
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 0 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } }
        },
        {
          "id": 6,
          "title": "Percent of 5xx Requests",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 10, "x": 14, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "sum by(handler) (http_requests_total{job=\"task-manager-backend\", status=\"5xx\", handler!=\"/metrics\"}) / sum by(handler) (http_requests_total{job=\"task-manager-backend\", handler!=\"/metrics\"})",
            "legendFormat": "{{handler}}",
            "refId": "A"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 0.1 }] },
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 0 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } }
        },
        {
          "id": 7,
          "title": "P99 Request Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"task-manager-backend\", handler!=\"/metrics\"}[1m])) by(handler, le))",
            "legendFormat": "{{handler}}",
            "refId": "A"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 0 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } }
        },
        {
          "id": 8,
          "title": "Request Per Second (by pod)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "rate(http_requests_total{job=\"task-manager-backend\", handler!=\"/metrics\"}[1m])",
            "legendFormat": "{{pod}} {{method}} {{handler}}",
            "refId": "A"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 0 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } }
        },
        {
          "id": 9,
          "title": "Backend Replicas (HPA)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "kube_deployment_status_replicas{namespace=\"task-manager\", deployment=\"backend\"}",
            "legendFormat": "replicas",
            "refId": "A"
          }],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } }
        }
      ]
    }
