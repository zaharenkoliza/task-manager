# SonarCloud project configuration
# Обновите sonar.projectKey и sonar.organization после создания проекта в SonarCloud

sonar.projectKey=itsamantha_task-manager
sonar.organization=itsamantha
sonar.projectName=Task Manager Backend
sonar.projectVersion=1.0

# Исходный код
sonar.sources=src
sonar.tests=tests
sonar.language=py
sonar.python.version=3.12

# Покрытие тестами
sonar.python.coverage.reportPaths=coverage.xml

# Исключения
sonar.exclusions=**/__pycache__/**,**/venv/**,**/migrations/**
sonar.coverage.exclusions=**/seed.py,**/database.py
