---
- name: Install Docker on VM
  hosts: task_manager_vms
  become: true   # выполнять команды через sudo

  tasks:
    # Обновляем список пакетов
    - name: Update apt cache
      apt:
        update_cache: yes

    # Устанавливаем зависимости для Docker
    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    # Создаём папку для ключей
    - name: Create directory for apt keys
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # Добавляем официальный GPG-ключ Docker
    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg   # не выполнять если файл уже есть

    # Добавляем репозиторий Docker
    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu \
        $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    # Обновляем кэш с новым репозиторием
    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    # Устанавливаем Docker
    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    # Запускаем Docker и добавляем в автозапуск
    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    # Добавляем пользователя ubuntu в группу docker
    # (чтобы не писать sudo перед каждой командой docker)
    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # Проверяем что Docker установился
    - name: Verify Docker installation
      command: docker --version
      register: docker_version_output

    - name: Show Docker version
      debug:
        msg: "{{ docker_version_output.stdout }}"
